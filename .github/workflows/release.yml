name: release

# Build on version tags (v*) and publish through a gated pipeline:
# TestPyPI first, then PyPI — both via Trusted Publishing (OIDC, no tokens).
# Docs: https://docs.pypi.org/trusted-publishers/
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Required for PyPI Trusted Publishing (OIDC).
permissions:
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Build distributions
        run: uv build --no-sources

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Publish to TestPyPI
        run: uv publish --publish-url https://test.pypi.org/legacy/

  pypi:
    needs: testpypi # PyPI only ships if TestPyPI succeeded.
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Publish to PyPI
        run: uv publish
